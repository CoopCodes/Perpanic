[build]
  command = "npm --prefix react-app run build"
  publish = "react-app/dist"
  functions = "react-app/netlify/functions"

[dev]
  command = "npm --prefix react-app run dev -- --port 5173"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

